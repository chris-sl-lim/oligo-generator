<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Maxion Oligo Generator</title>
        <!--<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">-->
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
        <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    </head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Maxion Oligo Generator</h1>

        <!-- Text Box -->

            </div>
            <div class="col-md-6">
                <div class="form-group">
                    <label for="exampleFormControlInput1">Amino Acid Code To Fix</label>
                    <input type="text" class="form-control" id="aaFixedCodes" placeholder="C,I">
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="form-group">
                    <label for="exampleFormControlInput1">Nucleotide Positions to Fix</label>
                    <input type="text" class="form-control" id="ntFixedPositions" placeholder="1,3,5">
                </div>
            </div>
            <div class="col-md-6">
                <div class="form-group">
                    <label for="exampleFormControlInput1">Amino Acid Positions To Fix</label>
                    <input type="text" class="form-control" id="aaFixedPositions" placeholder="2,4,6">
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="form-group">
                    <label for="exampleFormControlInput1">Restricted Nucleotide Sequences</label>
                    <!--<textarea class="form-control" id="ntRestrictedSequences" rows="4" placeholder="Enter text"></textarea>
                    <button type="submit" class="btn btn-primary mt-2">Load from File</button>
                    <button type="submit" class="btn btn-primary mt-2" onclick="loadDefaultRestrictionSites()">Load Default Restriction Sites</button>-->
                    <div style="overflow-y: auto; max-height: 250px;">
                        <table class="table table-condensed table-hover" id="restrictionsTable">
                            <thead>
                            <tr style="line-height: 1;">
                                <th scope="col">Name</th>
                                <th scope="col">Sequence</th>
                                <th scope="col">Select</th>
                            </tr>
                            </thead>
                            <tbody style="line-height: 1;">
                            <tr>
                                <th scope="row">BamH1</th>
                                <td>GGATCC</td>
                                <td><input type="checkbox"></td>
                            </tr>
                            <tr>
                                <th scope="row">Bbs1</th>
                                <td>GAAGAC</td>
                                <td><input type="checkbox"></td>
                            </tr>
                            <tr>
                                <th scope="row">Bsa1</th>
                                <td>GGTCTC</td>
                                <td><input type="checkbox"></td>
                            </tr>
                            <tr>
                                <th scope="row">BspE1</th>
                                <td>TCCGGA</td>
                                <td><input type="checkbox"></td>
                            </tr>
                            <tr>
                                <th scope="row">ClaI</th>
                                <td>ATCGAT</td>
                                <td><input type="checkbox"></td>
                            </tr>
                            <tr>
                                <th scope="row">HindIII</th>
                                <td>AAGCTT</td>
                                <td><input type="checkbox"></td>
                            </tr>
                            <tr>
                                <th scope="row">MfeI</th>
                                <td>CAATTG</td>
                                <td><input type="checkbox"></td>
                            </tr>
                            <tr>
                                <th scope="row">Nco1</th>
                                <td>CCATGG</td>
                                <td><input type="checkbox"></td>
                            </tr>
                            <tr>
                                <th scope="row">Nhe1</th>
                                <td>GCTAGC</td>
                                <td><input type="checkbox"></td>
                            </tr>
                            <tr>
                                <th scope="row">Not1</th>
                                <td>GCGGCCGC</td>
                                <td><input type="checkbox"></td>
                            </tr>
                            <tr>
                                <th scope="row">Pst1</th>
                                <td>CTGCAG</td>
                                <td><input type="checkbox"></td>
                            </tr>
                            <tr>
                                <th scope="row">Sap1</th>
                                <td>GCTCTTC</td>
                                <td><input type="checkbox"></td>
                            </tr>
                            <tr>
                                <th scope="row">Xho1</th>
                                <td>CTCGAG</td>
                                <td><input type="checkbox"></td>
                            </tr>
                            <tr>
                                <th scope="row">Bsa1_r</th>
                                <td>GAGACC</td>
                                <td><input type="checkbox"></td>
                            </tr>
                            <tr>
                                <th scope="row">Bbs1_r</th>
                                <td>GTCTTC</td>
                                <td><input type="checkbox"></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                    <button type="submit" class="btn btn-primary mt-2" onclick="selectAll()">Select All</button>
                    <button type="submit" class="btn btn-primary mt-2" onclick="removeAll()">Remove All</button>
                </div>
            </div>
            <div class="col-md-6">
                <div class="form-group">
                    <label for="exampleFormControlInput1">Restricted Amino Acid Sequences</label>
                    <textarea class="form-control" id="aaRestrictedSequences" rows="10" style="height: 250px;" placeholder="Enter text"></textarea>
                    <button type="submit" class="btn btn-primary mt-2">Load from File</button>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label for="exampleFormControlInput1">Translated Amino Acid Sequence</label>
            <input type="text" class="form-control" id="inputAminoAcidSequence" placeholder="" readonly>
        </div>

        <div class="form-group">
            <label for="exampleFormControlInput1">Nucleotide Sequence with Fixed Positions in <span style="font-weight: bold;">bold</span></label>
            <p id="fixedNucleotideSequence"></p>
        </div>

        <div class = "text-center row">
            <div class = "col">
                <button id="checkInputsBtn" class="btn btn-primary col" onclick="checkInputs()">Check Inputs</button>
            </div>
            <div class = "col">
                <button id="generateSequencesBtn" class="btn btn-primary col" onclick="generateSequences()">Generate Sequences</button>
            </div>
            <div class = "col">
                <button id="exportSequencesBtn" class="btn btn-primary col" onclick="exportSequences()">Export Sequences</button>
            </div>
        </div>
    </div>

    <div id="progress-bar-container" class="container mt-5">
        <!--<div id="progress-bar" style="width: 0;"></div>-->
        <div id="progress-bar" class="progress-bar" role="progressbar" aria-label="Basic example" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
        <div id="progress-message" class="text-center"></div>
    </div>

    <div class="container mt-5">
        <p id="result-title" class="font-weight-bold">Generated library:</p>
        <div id="result-container">Sequences will appear here.</div>
    </div>

    <script>           

        function generateSequences() {
            // Reset progress bar
            $('#progress-bar').css('width', 0 + '%');
            $('#progress-message').text('');

            // Connect SocketIO
            var socket = io.connect('http://' + document.domain + ':' + location.port);

            // Set Socket functionality
            socket.on('connect', function() {
                console.log('Connected to server');
                // socket.emit('start_task');
            });

            // Set socket update function
            socket.on('update_progress', function(data) {

                // Update progress bar
                var progressValue = data.progress;
                var currentState = data.current_state;
                var total = data.total;

                // Get the progress bar element
                var progressBar = document.getElementById("progress-bar");

                // Set progress message
                var progressMessage = document.getElementById("progress-message");
                if (progressValue < 50) {
                    progressMessage.innerHTML = 'Generating amino acid sequences with ' + currentState + ' changes.';
                } else {
                    progressMessage.innerHTML = 'Generated nucleotide sequence ' + currentState + ' of ' + total;
                }                                

                // Update the width and aria-valuenow attributes
                progressBar.style.width = progressValue + "%";
                progressBar.setAttribute("aria-valuenow", progressValue);
                progressBar.innerHTML = Math.round(progressValue) + "%";

                if (progressValue >= 100) {
                    // Close the connection after the task is complete
                    socket.disconnect();
                }
            });     

            // Get the data out of the form
            var baseNucleotideSequence = document.getElementById("inputSequence").value;
            var numChanges = document.getElementById("numChanges").value;
            var ntFixedPositions = document.getElementById("ntFixedPositions").value;
            var aaFixedPositions = document.getElementById("aaFixedPositions").value;
            var aaFixedCodes = document.getElementById("aaFixedCodes").value;
            var aaRestrictedSequences = document.getElementById("aaRestrictedSequences").value;
            // var ntRestrictedSequences = document.getElementById("ntRestrictedSequences").value;

            // Return restriction sites
            var ntRestrictedSequences = parseRestrictionSites();
            
            // Create a new request through AJAX
            var xhr = new XMLHttpRequest();
            xhr.open("POST", "/generateSequences", true);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.onreadystatechange = function () {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    parseResult(xhr.responseText)
                }
            };
            xhr.send(JSON.stringify({"inputSequence": baseNucleotideSequence, 
                "numChanges": numChanges, 
                "ntFixedPositions": ntFixedPositions,
                "aaFixedPositions": aaFixedPositions,
                "aaFixedCodes": aaFixedCodes,
                "aaRestrictedSequences": aaRestrictedSequences,
                "ntRestrictedSequences": ntRestrictedSequences
            }));
        }

        function checkInputs() {
            // Get the data out of the form
            var baseNucleotideSequence = document.getElementById("inputSequence").value;
            var numChanges = document.getElementById("numChanges").value;
            var ntFixedPositions = document.getElementById("ntFixedPositions").value;
            var aaFixedPositions = document.getElementById("aaFixedPositions").value;
            var aaFixedCodes = document.getElementById("aaFixedCodes").value;
            var aaRestrictedSequences = document.getElementById("aaRestrictedSequences").value;
            // var ntRestrictedSequences = document.getElementById("ntRestrictedSequences").value;

            // Return restriction sites
            var ntRestrictedSequences = parseRestrictionSites();
            
            // Create a new request through AJAX
            var xhr = new XMLHttpRequest();
            xhr.open("POST", "/checkInputs", true);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.onreadystatechange = function () {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    parseInputCheckResult(xhr.responseText)
                }
            };
            xhr.send(JSON.stringify({"inputSequence": baseNucleotideSequence, 
                "numChanges": numChanges, 
                "ntFixedPositions": ntFixedPositions,
                "aaFixedPositions": aaFixedPositions,
                "aaFixedCodes": aaFixedCodes, 
                "aaRestrictedSequences": aaRestrictedSequences,
                "ntRestrictedSequences": ntRestrictedSequences
            }));
        }

        function parseInputCheckResult(jsonResponse) {
            // Parse JSON
            var resultsObject = JSON.parse(jsonResponse);
            var base_aa_sequence = resultsObject.base_amino_acid_sequence;
            var fixed_positions = resultsObject.fixed_positions

            // Update translated amino acid sequence
            document.getElementById("inputAminoAcidSequence").value = resultsObject.base_amino_acid_sequence;

            // Update fixed nucleotide sequence
            var nt_sequence = document.getElementById("inputSequence").value;
            var formatted_nt_sequence = ""
            for (var i = 0; i < nt_sequence.length; i++) {
                var currentChar = nt_sequence.charAt(i);
                if (fixed_positions[i] == false) {
                    formatted_nt_sequence += '<span style="font-weight: bold;">' + currentChar + '</span>';
                } else {
                    formatted_nt_sequence += currentChar;
                }
            }   
            document.getElementById("fixedNucleotideSequence").innerHTML = formatted_nt_sequence;
        }
        
        function parseResult(jsonResponse) {
            // Parse JSON
            var resultsObject = JSON.parse(jsonResponse);
            var base_aa_sequence = resultsObject.base_amino_acid_sequence;
            var nt_sequences = resultsObject.nucleotide_sequences;
            var aa_sequences = resultsObject.amino_acid_sequences;
            var changes = resultsObject.changes;

            // Update translated amino acid sequence
            document.getElementById("inputAminoAcidSequence").value = resultsObject.base_amino_acid_sequence;

            // Parse results table title
            document.getElementById("result-title").innerHTML = "Generated " + nt_sequences.length + " sequences from base sequence " + base_aa_sequence;
            
            // Display table
            displayResultsInTable(nt_sequences, aa_sequences, changes)

        }

        // Function to create HTML table
        function displayResultsInTable(nt_sequences, aa_sequences, changes) {

            // Get where we are going to put the table
            var tableContainer = document.getElementById("result-container");
            tableContainer.innerHTML = ''

            // Create table element
            var table = document.createElement("table");
            table.classList.add("table", "table-bordered", "table-striped");

            // Create table header
            var thead = document.createElement("thead");
            var headerRow = document.createElement("tr");
            var headers = ["Nucleotide Sequences", "Amino Acid Sequences", "Change Attempts"];
            headers.forEach(function(headerText) {
                var th = document.createElement("th");
                th.textContent = headerText;
                headerRow.appendChild(th);
            });
        
            thead.appendChild(headerRow);
            table.appendChild(thead);

             // Create table body
            var tbody = document.createElement("tbody");

            // Determine the maximum number of rows based on the length of the columns
            var numRows = Math.max(nt_sequences.length, aa_sequences.length, changes.length);

            for (var i = 0; i < numRows; i++) {
              var row = document.createElement("tr");
            
              // Add cells to the row, using empty string if the array doesn't have a value at that index
              var cell1 = document.createElement("td");
              cell1.textContent = nt_sequences[i] || "";
              row.appendChild(cell1);
            
              var cell2 = document.createElement("td");
              cell2.textContent = aa_sequences[i] || "";
              row.appendChild(cell2);
            
              var cell3 = document.createElement("td");
              cell3.textContent = changes[i] || "";
              row.appendChild(cell3);
            
              tbody.appendChild(row);
            }

            table.appendChild(tbody);

            // Append the table to the container
            tableContainer.appendChild(table);           

        }

        function buildTableData() {
            const elements = [...document.querySelectorAll('td')];
            return elements.map(x => {
            return {content : x.innerHTML}
            });
        }

        // Function to export library
        function exportSequences() {
            // Get the HTML table
            var tableBody = document.getElementById("result-container").getElementsByTagName('tbody')[0];

            // Initialize the CSV string
            var csv = [];

            // Iterate through table rows and cells
            var numRows = tableBody.rows.length;
            for (var i = 1, numRows; row = tableBody.rows[i]; i++) {
                csv.push(row.cells[0].innerText);
            }

            // Create a CSV blob
            var csvContent = csv.join('\n');
            var blob = new Blob([csvContent], { type: 'text/csv' });

            // Create a download link
            var link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.download = 'exported_data.csv';

            // Append the link to the document and trigger the click event
            document.body.appendChild(link);
            link.click();

            // Remove the link from the document
            document.body.removeChild(link);
        }

        // Function to select all and remove all nucleotide sites
        function selectAll() {
            var checkboxes = document.querySelectorAll('#restrictionsTable tbody input[type="checkbox"]');
            checkboxes.forEach(function (checkbox) {
                checkbox.checked = true;
            });
        }

        function removeAll() {
            var checkboxes = document.querySelectorAll('#restrictionsTable tbody input[type="checkbox"]');
            checkboxes.forEach(function (checkbox) {
                checkbox.checked = false;
            });
        }

        // Function to parse the restriction sites check boxes
        function parseRestrictionSites() {            
            // Get the check boxes
            var checkboxes = document.querySelectorAll('#restrictionsTable tbody input[type="checkbox"]');
            var selectedItems = [];

            // Loop through
            checkboxes.forEach(function (checkbox, index) {
                if (checkbox.checked) {
                    var itemName = document.querySelectorAll('#restrictionsTable tbody td:nth-child(2)')[index].innerText;
                    selectedItems.push(itemName);
                }
            });
            
            // Return
            return selectedItems;
        }

    </script>

</body>
</html>
